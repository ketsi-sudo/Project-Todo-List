<body>
    
  <div id="mySidebar" class="sidebar">
      <a href="javascript:void(0)" class="closebtn">&times;</a>

      <div class="project-list">
        <a href="#" class="single-project">

          <button class="delete-project">x</button>
        </a> 
      </div>

      <button command="show-modal" commandfor="my-project-dialog" class="add-single-folder">Add project +</button>
      <dialog  id="my-project-dialog">
        <form class="create-project">

          <div id="two-col">
            <div>
              <label for="title_project">Choose a title for your new project</label>
              <input type="text" id="title_project">
            </div>

        
          <button type="submit" class="submit-project">Add new project +</button>
        
        </form>
        <button  type="button" commandfor="my-project-dialog" command="close">Close</button>
      </dialog>
  </div>





  <div class="main">

    <div class="openbtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
        <title xmlns="">menu</title><g fill="none" stroke="currentColor" stroke-dasharray="16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M5 5h14"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.3s" values="16;0"/></path><path stroke-dashoffset="16" d="M5 12h14"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.3s" dur="0.3s" to="0"/></path><path stroke-dashoffset="16" d="M5 19h14"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.6s" dur="0.3s" to="0"/></path></g>
      </svg>
      <p>Projects</p>
    </div>  

    <div class="taskList">
              


    <details class=" accordion-item collapse" name="my-accordion-det-1" open>
      <summary class="collapse-title font-semibold">
        <div class="accordion-header">
          <div class="accordion-closed-top">
            <div class="accordion-closed-top-title">
              <label>
                <input type="checkbox"  class="checkbox  border-neutral-600 bg-mist-50 text-mist-50 checked:border-orange-500 checked:bg-orange-400 checked:text-orange-400" />
                <span class="checkmark"></span>
                Grocery Shop
              </label>
            </div>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 19C6 19.5304 6.21071 20.0391 6.58579 20.4142C6.96086 20.7893 7.46957 21 8 21H16C16.5304 21 17.0391 20.7893 17.4142 20.4142C17.7893 20.0391 18 19.5304 18 19V7H6V19ZM8 9H16V19H8V9ZM15.5 4L14.5 3H9.5L8.5 4H5V6H19V4H15.5Z" fill="black" fill-opacity="0.5"/>
              </svg>
          </div>

          <div class="accordion-closed-bottom">
            <p class="due-text">Due Sept. 9th 2027</p>
            <p class="priority-text">Low</p>
          </div>
        </div>
      </summary>

  <div class=" accordion-content collapse-content text-sm">
    <hr width="100%" size="2" color="gray">
    <div class="accordion-open-top">
      <p class="note">Buy nothing that is not on this list!</p>
      <p class="tags">Errand</p>
    </div>
    <ul class="note-list">
      <li>
        Mouthwash
      </li>

      <li>
        Apples
      </li>

      <li>
        Bananas
      </li>

      <li>
        Donuts
      </li>
    </ul>
    <!-- Click the "Sign Up" button in the top right corner and follow the registration process. -->
  </div>
</details>




<details class=" accordion-item collapse bg-base-100 border border-base-300" name="my-accordion-det-1">
      <summary class="collapse-title font-semibold">
        <div class="accordion-header">
          <div class="accordion-closed-top">
            <div class="accordion-closed-top-title">
              <label>
                <input type="checkbox"  class="checkbox  border-neutral-600 bg-mist-50 text-mist-50 checked:border-orange-500 checked:bg-orange-400 checked:text-orange-400" />
                <span class="checkmark"></span>

            </div>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 19C6 19.5304 6.21071 20.0391 6.58579 20.4142C6.96086 20.7893 7.46957 21 8 21H16C16.5304 21 17.0391 20.7893 17.4142 20.4142C17.7893 20.0391 18 19.5304 18 19V7H6V19ZM8 9H16V19H8V9ZM15.5 4L14.5 3H9.5L8.5 4H5V6H19V4H15.5Z" fill="black" fill-opacity="0.5"/>
              </svg>
          </div>

          <div class="accordion-closed-bottom">
            <p class="due-text">Due Sept. 9th 2027</p>
            <p class="priority-text">Low</p>
          </div>
        </div>
      </summary>

  <div class=" accordion-content collapse-content text-sm">
    <hr width="100%" size="2" color="gray">
    <div class="accordion-open-top">
      <p class="note">Buy nothing that is not on this list!</p>
      <p class="tags">Errand</p>
    </div>
    <ul class="note-list">
      <li>
        Mouthwash
      </li>

      <li>
        Apples
      </li>

      <li>
        Bananas
      </li>

      <li>
        Donuts

    </ul>
    <!-- Click the "Sign Up" button in the top right corner and follow the registration process. -->
  </div>
</details>


  </div>

<button command="show-modal" commandfor="my-dialog" class="add-task">Add task +</button>
<dialog  id="my-dialog">
  <form class="create-task">

    <h1>Create your new task</h1>

    <div id="two-col">
      <div>
        <label for="title_task">Title</label>
        <input type="text" id="title_task">
      </div>

      <div>
        <label for="priority_task">Assign priority</label>
        <select name="priority_task" id="priority_task">
          <option value="Low" selected>Low</option>
          <option value="Medium">Medium</option>     
          <option value="High">High</option>    
        </select>
      </div>
    </div>

    <div id="two-col">
      <div>
      <label for="project_task">Choose a project</label>

      <select name="project_task" id="project_task">
        <!-- <option value="Inbox" selected>Inbox</option>
        <option value="Work">Work</option> -->
        
      </select>
      </div>

      <div>
      <label for="due_date">Due Date</label>
      <input type="date" id="due_date">
      </div>
    </div>

    <div class="my-editor">
        <label for="note_task">Note</label>
        <div class="my-toolbar"></div>
        <div class="my-content" id="note_task"></div>
    </div>

    <!-- <div>
      <label for="note_task">Note</label>
      <textarea id="note_task"></textarea>
    </div>

    <div>
      <label for="checklist_task">Checklist</label>
      <input type="text" id="checklist_task">
      <h4>Checklist preview</h4>
      <ul></ul>
    </div> -->


  
    <button type="submit" class="submit-task">Add new task +</button>
  
  </form>
  <button commandfor="my-dialog" command="close">Close</button>
</dialog>





</div>


<div class="my-editor">
  <div class="my-toolbar"></div>
  <div class="my-content"></div>
</div>
<button id="Ssave">Ssave</button>

    <!-- Input field for new list item text -->
    <div>
      <label for="newItemInput">Add a checklist</label>
      <input 
          type="text" 
          id="newItemInput" 
          placeholder="Enter a sub-task then click enter to add it">
      
      <!-- Button to trigger adding the item -->
      <button type="button"  id="addButton">Add Item</button>
      
      <!-- Unordered list to hold list items -->
      <div id="dynamicList"></div>
    </div>






  
    



 



</body>
